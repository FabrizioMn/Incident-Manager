server:
  port: 8080

spring:
  application:
    name: incident-manager
  datasource:
    url: jdbc:h2:mem:incidentdb
    driver-class-name: org.h2.Driver
    name: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
